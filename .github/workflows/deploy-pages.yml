name: Deploy GitHub Pages

on:
  push:
    branches:
      - prod
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CONTACT_EMAIL: ${{ vars.CONTACT_EMAIL }}
      LINKEDIN_URL: ${{ vars.LINKEDIN_URL }}
      RESUME_URL: ${{ vars.RESUME_URL }}
      GOOGLE_SITE_VERIFICATION: ${{ vars.GOOGLE_SITE_VERIFICATION }}
      PLAUSIBLE_DOMAIN: ${{ vars.PLAUSIBLE_DOMAIN }}
      PLAUSIBLE_SCRIPT_SRC: ${{ vars.PLAUSIBLE_SCRIPT_SRC }}
      PLAUSIBLE_API_HOST: ${{ vars.PLAUSIBLE_API_HOST }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Validate and build static site
        run: npm run validate

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4